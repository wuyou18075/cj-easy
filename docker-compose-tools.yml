version: '3.8'

services:
#START
#NAME:探针监控komari
#PARAM_PORT:端口=25774
#PARAM_ADMIN_USERNAME:管理员用户名=admin
#PARAM_ADMIN_PASSWORD:管理员密码=admin
  komari:
    image: ghcr.io/komari-monitor/komari:latest
    container_name: komari
    restart: always
    ports:
      - "127.0.0.1:{PARAM_PORT}:25774"
    volumes:
      - ./komari:/app/data
    environment:
      - ADMIN_USERNAME={PARAM_ADMIN_USERNAME}
      - ADMIN_PASSWORD={PARAM_ADMIN_PASSWORD}
#END
#START
#NAME:npm服务
#PARAM_PORT:端口=80
  npm:
    image: node:18-alpine
    container_name: npm
    restart: always
    working_dir: /app
    ports:
      - "{PARAM_PORT}:80"
    volumes:
      - ./npm:/app
    command: sh -c "npm install && npm start"
#END
#START
#NAME:PostgreSQL 18
#PARAM_PORT:端口=5432
#PARAM_POSTGRES_USER:用户名=postgres
#PARAM_POSTGRES_PASSWORD:密码=postgres
#PARAM_POSTGRES_DB:数据库名=postgres
  postgres:
    image: postgres:18
    container_name: postgres
    restart: always
    ports:
      - "{PARAM_PORT}:5432"
    volumes:
      # PG 18+ 官方镜像要求挂载 /var/lib/postgresql（不要再挂 .../data）
      - ./postgres/data:/var/lib/postgresql
    environment:
      - POSTGRES_USER={PARAM_POSTGRES_USER}
      - POSTGRES_PASSWORD={PARAM_POSTGRES_PASSWORD}
      - POSTGRES_DB={PARAM_POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
#END
#START
#NAME:Redis 8.2
#PARAM_PORT:端口=6379
#PARAM_REDIS_PASSWORD:密码=redis
  redis:
    image: redis:8.2.7
    container_name: redis
    restart: always
    ports:
      - "{PARAM_PORT}:6379"
    volumes:
      - ./redis/data:/data
    command: redis-server --appendonly yes --requirepass {PARAM_REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "{PARAM_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
#END
#START
#NAME:CPA Manager Plus
#PARAM_PORT:端口=18317
  cpa-manager-plus:
    image: seakee/cpa-manager-plus:latest
    container_name: cpa-manager-plus
    restart: always
    ports:
      - "{PARAM_PORT}:18317"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HTTP_ADDR=0.0.0.0:18317
      - USAGE_DB_PATH=/data/usage.sqlite
      - CPA_MANAGER_DATA_KEY_PATH=/data/data.key
      - USAGE_COLLECTOR_MODE=auto
      - USAGE_BATCH_SIZE=100
      - USAGE_POLL_INTERVAL_MS=500
      - USAGE_QUERY_LIMIT=50000
      - USAGE_CORS_ORIGINS=*
    volumes:
      - ./cpa-manager-plus/data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18317/health"]
      interval: 10s
      timeout: 3s
      retries: 3
#END
