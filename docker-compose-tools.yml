version: '3.8'

services:
#START
#NAME:探针监控komari
#PARAM_PORT:端口=25774
#PARAM_ADMIN_USERNAME:管理员用户名=admin
#PARAM_ADMIN_PASSWORD:管理员密码=admin
  komari:
    image: ghcr.io/komari-monitor/komari:latest
    container_name: komari
    restart: always
    ports:
      - "127.0.0.1:{PARAM_PORT}:25774"
    volumes:
      - ./komari:/app/data
    environment:
      - ADMIN_USERNAME={PARAM_ADMIN_USERNAME}
      - ADMIN_PASSWORD={PARAM_ADMIN_PASSWORD}
#END
#START
#NAME:npm服务
#PARAM_PORT:端口=80
  npm:
    image: node:18-alpine
    container_name: npm
    restart: always
    working_dir: /app
    ports:
      - "{PARAM_PORT}:80"
    volumes:
      - ./npm:/app
    command: sh -c "npm install && npm start"
#END
#START
#NAME:PostgreSQL 18
#PARAM_PORT:端口=5432
#PARAM_POSTGRES_USER:用户名=postgres
#PARAM_POSTGRES_PASSWORD:密码=postgres
#PARAM_POSTGRES_DB:数据库名=postgres
  postgres:
    image: postgres:18
    container_name: postgres
    restart: always
    ports:
      - "{PARAM_PORT}:5432"
    volumes:
      # PG 18+ 官方镜像要求挂载 /var/lib/postgresql（不要再挂 .../data）
      - ./postgres/data:/var/lib/postgresql
    environment:
      - POSTGRES_USER={PARAM_POSTGRES_USER}
      - POSTGRES_PASSWORD={PARAM_POSTGRES_PASSWORD}
      - POSTGRES_DB={PARAM_POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
#END
#START
#NAME:Redis 8.2
#PARAM_PORT:端口=6379
#PARAM_REDIS_PASSWORD:密码=redis
  redis:
    image: redis:8.2.7
    container_name: redis
    restart: always
    ports:
      - "{PARAM_PORT}:6379"
    volumes:
      - ./redis/data:/data
    command: redis-server --appendonly yes --requirepass {PARAM_REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "{PARAM_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
#END
#START
#NAME:CPA + CPAMP 完整栈
#PARAM_CPAMP_PORT:CPAMP面板端口=18317
#PARAM_CPA_PORT:CPA网关端口=8317
#PARAM_ADMIN_KEY:CPAMP管理员密钥(登录management.html用)
#PARAM_CPA_MGMT_KEY:CPA Management Key(remote-management.secret-key)
#PARAM_CPA_API_KEY:CPA客户端API Key(可选演示用)=sk-demo-change-me
  # 对齐官方 docker-compose：多端口为 OAuth/回调/插件本地监听；auths 持久化避免重复装插件
  cli-proxy-api:
    image: eceasy/cli-proxy-api:latest
    pull_policy: always
    container_name: cli-proxy-api
    restart: unless-stopped
    ports:
      - "{PARAM_CPA_PORT}:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ./cli-proxy-api/config.yaml:/CLIProxyAPI/config.yaml
      - ./cli-proxy-api/auths:/root/.cli-proxy-api
      - ./cli-proxy-api/logs:/CLIProxyAPI/logs
  cpa-manager-plus:
    image: seakee/cpa-manager-plus:latest
    pull_policy: always
    container_name: cpa-manager-plus
    restart: unless-stopped
    ports:
      - "{PARAM_CPAMP_PORT}:18317"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HTTP_ADDR=0.0.0.0:18317
      - USAGE_DB_PATH=/data/usage.sqlite
      - CPA_MANAGER_DATA_KEY_PATH=/data/data.key
      - CPA_MANAGER_ADMIN_KEY={PARAM_ADMIN_KEY}
      - CPA_UPSTREAM_URL=http://cli-proxy-api:8317
      - CPA_MANAGEMENT_KEY={PARAM_CPA_MGMT_KEY}
      - USAGE_COLLECTOR_MODE=auto
      - USAGE_RESP_QUEUE=usage
      - USAGE_RESP_POP_SIDE=right
      - USAGE_BATCH_SIZE=100
      - USAGE_POLL_INTERVAL_MS=500
      - USAGE_QUERY_LIMIT=50000
      - USAGE_CORS_ORIGINS=*
    volumes:
      - ./cpa-manager-plus/data:/data
    depends_on:
      - cli-proxy-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18317/health"]
      interval: 10s
      timeout: 3s
      retries: 3
#END
